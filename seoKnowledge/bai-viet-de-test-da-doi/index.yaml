title: Bài Viết để test
excerpt: >-
  Một mặt tiền đẹp không chỉ giúp ngôi nhà trở nên nổi bật hơn mà còn thể hiện
  phong cách sống, gu thẩm mỹ và sự đầu tư của gia chủ dành cho tổ ấm của mình.
  Đặc biệt với nhà gác lửng, việc thiết kế mặt tiền hợp lý còn giúp tối ưu ánh
  sáng, thông gió và tạo cảm giác không gian rộng rãi hơn so với diện tích thực
  tế.
